syntax = "proto3";

package events;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/ravsanalbertovic-sketch/scheduler-general-lib/tree/main/api/pb/v1/events;user_eventsv1";

message UserDeleted{
  string EventID = 1;
  string UserID = 2;
  string Email = 3;
  google.protobuf.Timestamp CreatedAt = 4;
}
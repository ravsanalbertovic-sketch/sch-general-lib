syntax = "proto3";

package auth;

option go_package = "github.com/ravsanalbertovic-sketch/scheduler-general-lib/tree/main/api/pb/v1/auth;authv1";

service AuthService {
  rpc Register (RegisterRequest) returns (RegisterResponse);
  rpc Login (LoginRequest) returns (LoginResponse);
  rpc RefreshTokens(RefreshTokensRequest) returns (RefreshTokensResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc LogoutAll(LogoutAllRequest) returns (LogoutAllResponse);
  rpc DeleteUser (DeleteUserRequest) returns (DeleteUserResponse);
  rpc GetUsers (GetUsersRequest ) returns (GetUsersResponse);
  rpc GetUserEmailByID (GetUserEmailByIDRequest) returns (GetUserEmailByIDResponse);
  rpc GetUserIDByEmail (GetUserIDByEmailRequest) returns (GetUserIDByEmailResponse);
  rpc IsAdmin (IsAdminRequest) returns (IsAdminResponse);
  rpc RegisterAdmin (RegisterAdminRequest) returns (RegisterAdminResponse);
  rpc SetTZToUser (SetTZToUserRequest) returns (SetTZToUserResponse);
  rpc GetTZFromUser (GetTZFromUserRequest) returns (GetTZFromUserResponse);
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string tz = 3;
}

message RegisterResponse {
  bool success = 1;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message RefreshTokensRequest {
  string refresh_token = 1;
}

message RefreshTokensResponse {
  string access_token = 1;
  string refresh_token = 2;
}

message LogoutRequest {
  string refresh_token = 1;
}

message LogoutResponse {
  bool success = 1;
}

message LogoutAllRequest {}

message LogoutAllResponse {
  bool success = 1;
}

message DeleteUserRequest {}

message DeleteUserResponse {
  bool success = 1;
}

message GetUsersRequest {}

message GetUsersResponse {
  repeated GetUsers users = 1;
}

message GetUserEmailByIDRequest {}

message GetUserEmailByIDResponse {
  string email = 1;
}

message GetUserIDByEmailRequest {
  string email = 1;
}

message GetUserIDByEmailResponse {
  string id = 1;
}

message IsAdminRequest {}

message IsAdminResponse {
  bool is_admin = 1;
}

message RegisterAdminRequest {
  string email = 1;
  string password = 2;
  string tz = 3;
}

message RegisterAdminResponse {
  bool success = 1;
}

message SetTZToUserRequest {
 string tz = 1;
}

message SetTZToUserResponse {
  bool success = 1;
}

message GetTZFromUserRequest {}

message GetTZFromUserResponse {
  string tz = 1;
}

message GetUsers {
  string id = 1;
  string email = 2;
}